name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: artifacts/expense-splitter

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: pnpm install

      - name: Build React app
        run: pnpm build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Debug APK
        working-directory: artifacts/expense-splitter/android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SplitEasy-APK
          path: artifacts/expense-splitter/android/app/build/outputs/apk/debug/app-debug.apk
