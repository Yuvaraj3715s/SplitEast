kind = "web"
previewPath = "/"
title = "Group Expense Splitter"
version = "1.0.0"
id = "artifacts/expense-splitter"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20524

[services.development]
run = "pnpm --filter @workspace/expense-splitter run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/expense-splitter", "run", "build" ]
publicDir = "artifacts/expense-splitter/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20524"
BASE_PATH = "/"
